$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "samizdat:settings:paypal"
title: PayPal
description: PayPal payments (operator).
type: object
x-samizdat-audience: operator
x-samizdat-version: 1
properties:
  cardnumber: { type: integer }
  dbtype: { type: string, enum: [postgresql, mysql, redis], default: postgresql }
  currency: { type: string, default: USD }
  default_env: { type: string, default: test }
  business: { type: string }
  oauth2:
    type: object
    properties:
      token_url_template: { type: string, default: "{api}/v1/oauth2/token" }
  env:
    type: object
    description: Per-environment API base, client id and secret.
    additionalProperties:
      type: object
      properties:
        api: { type: string }
        client_id: { type: string }
        secret: { type: string, writeOnly: true }
